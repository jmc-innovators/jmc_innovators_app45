name: jmc_innovators_learning_platform
description: "JMC Innovators Learning Platform — AI-powered education for Grade 6-11 students in Sri Lanka."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Navigation
  go_router: ^14.2.0

  # State management
  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.3.0
  firebase_auth: ^5.1.4
  cloud_firestore: ^5.2.1
  firebase_storage: ^12.1.3
  firebase_messaging: ^15.0.4
  google_sign_in: ^6.2.1

  # UI / animation
  google_fonts: ^6.2.1
  lottie: ^3.1.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0

  # Content rendering
  flutter_markdown: ^0.7.3
  cached_network_image: ^3.3.1
  youtube_player_flutter: ^9.0.4
  photo_view: ^0.15.0

  # Storage / persistence
  shared_preferences: ^2.2.3
  path_provider: ^2.1.3
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Networking
  http: ^1.2.2
  dio: ^5.5.0

  # Utility
  math_expressions: ^2.6.0
  intl: ^0.19.0
  url_launcher: ^6.3.0
  connectivity_plus: ^6.0.5
  file_picker: ^8.0.6
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/lottie/
    - assets/icons/
